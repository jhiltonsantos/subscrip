version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: subscrip-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: subscrip
      POSTGRES_PASSWORD: subscrip_dev
      POSTGRES_DB: subscrip
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U subscrip -d subscrip']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
